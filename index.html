<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小路人 · 导航</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>🧭</text></svg>">
<style>
:root{--glass:rgba(255,255,255,0.07);--glass-hover:rgba(255,255,255,0.13);--border:rgba(255,255,255,0.1);--text:#f0f0f0;--dim:rgba(255,255,255,0.5)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#0a0a1a;min-height:100vh;color:var(--text);overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(120,80,255,0.2) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,60,120,0.15) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(60,160,255,0.1) 0%,transparent 60%)}
.topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 28px;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px}
.logo{font-size:1.2em;font-weight:700;letter-spacing:4px;color:#fff}
.logo span{background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.weather{display:flex;align-items:center;gap:8px;font-size:13px}
.weather-icon{font-size:1.3em}
.weather-info{display:flex;flex-direction:column}
.weather-temp{font-size:15px;font-weight:600;color:#fff}
.weather-city{font-size:11px;color:var(--dim)}
.weather-desc{font-size:11px;color:var(--dim)}
.music-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:50px;padding:8px 14px 8px 8px;cursor:pointer;transition:background .3s;min-width:240px;max-width:300px}
.music-bar:hover{background:rgba(255,255,255,0.1)}
.mcover{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c6df0,#f472b6);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;overflow:hidden;transition:transform .3s}
.mcover.playing{animation:spinCover 10s linear infinite}
@keyframes spinCover{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.minfo{min-width:0;flex:1;overflow:hidden}
.mname{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.martist{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.mbtns{display:flex;gap:2px;align-items:center}
.mbtn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;padding:3px;transition:color .2s;line-height:1;flex-shrink:0}
.mbtn:hover{color:#fff}
.top-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:36px 28px 80px}
.search-box{text-align:center;margin-bottom:40px;animation:fadeDown .8s ease both}
.swrap{position:relative;max-width:620px;margin:0 auto}
.swrap input{width:100%;padding:14px 50px 14px 22px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:50px;color:#fff;font-size:15px;backdrop-filter:blur(20px);transition:all .3s;outline:none}
.swrap input::placeholder{color:var(--dim)}
.swrap input:focus{background:rgba(255,255,255,0.12);border-color:rgba(167,139,250,0.5);box-shadow:0 0 0 3px rgba(167,139,250,0.15)}
.si{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:17px;pointer-events:none}
.engines{display:flex;justify-content:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.epill{padding:4px 14px;border-radius:20px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--dim);font-size:12px;cursor:pointer;transition:all .2s}
.epill.active,.epill:hover{background:rgba(167,139,250,0.3);color:#fff;border-color:rgba(167,139,250,0.5)}
.cat{margin-bottom:36px}
.catt{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.catt .dot{width:4px;height:20px;border-radius:2px;background:linear-gradient(180deg,#a78bfa,#f472b6);box-shadow:0 0 8px rgba(167,139,250,0.5)}
.catt h2{font-size:.9em;font-weight:400;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.catt .ln{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px}
.card{position:relative;background:var(--glass);border:1px solid var(--border);border-radius:16px;padding:22px 12px 16px;text-align:center;cursor:pointer;text-decoration:none;color:var(--text);backdrop-filter:blur(10px);transition:all .25s cubic-bezier(.4,0,.2,1);animation:fadeUp .4s ease both;overflow:hidden;display:block}
.card:hover{transform:translateY(-6px);background:var(--glass-hover);border-color:rgba(167,139,250,0.3);box-shadow:0 20px 40px rgba(0,0,0,.3)}
.card:active{transform:translateY(-2px)}
.cglow{position:absolute;inset:-1px;border-radius:16px;background:linear-gradient(135deg,rgba(167,139,250,.2),rgba(244,114,182,.1));opacity:0;transition:opacity .3s;pointer-events:none;z-index:-1}
.card:hover .cglow{opacity:1}
.ci{font-size:2.2em;margin-bottom:10px;display:block}
.cn{font-size:13px;font-weight:500;line-height:1.4;word-break:break-all}
.ctag{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;border-radius:7px;background:linear-gradient(135deg,#7c6df0,#a78bfa);color:#fff;opacity:0;transition:opacity .3s}
.card:hover .ctag{opacity:1}
footer{text-align:center;color:var(--dim);font-size:12px;padding:20px;letter-spacing:1px}

/* 内网按钮 - 固定在右下角，不挡音乐栏 */
.lan-btn{position:fixed;bottom:24px;right:24px;z-index:99;background:linear-gradient(135deg,#7c6df0,#a78bfa);color:#fff;border:none;padding:12px 18px;border-radius:50px;cursor:pointer;font-size:13px;letter-spacing:1px;box-shadow:0 4px 20px rgba(124,109,240,0.4);transition:all .3s;white-space:nowrap}
.lan-btn:hover{background:linear-gradient(135deg,#a78bfa,#f472b6);transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,109,240,0.5)}

/* 内网面板 - 右侧弹出，底部留足空间不挡音乐栏 */
.lan-panel{position:fixed;right:-230px;top:auto;bottom:80px;width:210px;background:rgba(10,10,30,.97);border:1px solid var(--border);border-radius:16px 0 0 16px;backdrop-filter:blur(20px);z-index:99;transition:right .4s cubic-bezier(.4,0,.2,1);padding:20px 16px;box-shadow:-4px 0 30px rgba(0,0,0,.4)}
.lan-panel.open{right:0}
.lan-panel h3{color:#fff;font-size:13px;margin-bottom:14px;letter-spacing:2px;text-align:center;padding-bottom:10px;border-bottom:1px solid var(--border)}
.lan-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text);text-decoration:none;font-size:12px;margin-bottom:7px;transition:all .2s}
.lan-item:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4);color:#fff;transform:translateX(-3px)}
.lan-tip{font-size:11px;color:var(--dim);line-height:1.6;margin-top:14px;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px;border:1px solid var(--border)}
.lan-tip strong{color:var(--dim)}

/* Music Panel */
#mp{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(110%);width:420px;max-width:95vw;background:rgba(10,10,30,.97);border:1px solid var(--border);border-bottom:none;border-radius:20px 20px 0 0;backdrop-filter:blur(30px);padding:20px 22px 28px;z-index:200;transition:transform .4s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto}
#mp.show{transform:translateX(-50%) translateY(0)}
.mph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mpt{font-size:14px;font-weight:600;color:#fff}
.mpcls{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
.mpalbum{width:130px;height:130px;margin:0 auto 12px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#2a2a4a,#1a1a3a);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 30px rgba(0,0,0,.4)}
.mpcd{width:90px;height:90px;border-radius:50%;background:conic-gradient(#333,#222,#333);display:flex;align-items:center;justify-content:center;transition:transform .3s}
.mpalbum.playing .mpcd{animation:spinSlow 12s linear infinite}
@keyframes spinSlow{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.mpcdc{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c6df0,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:13px}
.mpn{font-size:14px;font-weight:600;text-align:center;margin-bottom:2px;color:#fff}
.mpa{font-size:11px;color:var(--dim);text-align:center;margin-bottom:12px}
.mpbar{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;cursor:pointer;margin-bottom:5px}
.mpfill{height:100%;background:linear-gradient(90deg,#7c6df0,#a78bfa);border-radius:2px;width:0%;transition:width .3s}
.mptimes{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:12px}
.mpctrl{display:flex;justify-content:center;align-items:center;gap:14px}
.mpctrl button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:20px;transition:all .2s}
.mpctrl button:hover{color:#fff;transform:scale(1.1)}
.mpctrl .playb{font-size:30px;color:#fff}
.mpctrl .playb:hover{color:#a78bfa}
.mplistbtn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:50px;padding:6px 16px;color:var(--dim);font-size:12px;cursor:pointer;margin-top:10px;width:100%;transition:all .2s}
.mplistbtn:hover{background:rgba(255,255,255,.1);color:#fff}
.mpres{max-height:160px;overflow-y:auto;margin-top:8px;display:none}
.mpres.show{display:block}
.mpitem{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .2s}
.mpitem:hover{background:rgba(255,255,255,.07)}
.mpitem.playing{background:rgba(167,139,250,0.15)}
.mpitem.playing .rin{color:#a78bfa}
.rin{font-size:13px;color:var(--text)}
.ria{font-size:11px;color:var(--dim)}
.rip{font-size:13px;color:var(--dim);margin-left:auto}
.mpsearch{display:flex;gap:8px;margin-bottom:8px}
.mpsearch input{flex:1;padding:6px 10px;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:13px;outline:none}
.mpsearch input::placeholder{color:var(--dim)}
.mpsearchbtn{padding:6px 12px;border-radius:8px;background:linear-gradient(135deg,#7c6df0,#a78bfa);border:none;color:#fff;font-size:12px;cursor:pointer}
.lyrics{max-height:90px;overflow-y:auto;margin-bottom:10px;padding:0 4px;scrollbar-width:thin;scrollbar-color:rgba(167,139,250,0.3) transparent}
.lyrics::-webkit-scrollbar{width:3px}.lyrics::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);border-radius:2px}
.lyric-line{font-size:12px;color:var(--dim);line-height:1.8;transition:color .3s,font-size .3s;padding:1px 0;text-align:center}
.lyric-line.active{color:#fff;font-size:14px;font-weight:600;text-shadow:0 0 16px rgba(167,139,250,0.5)}
.lyric-empty{font-size:12px;color:var(--dim);text-align:center;padding:6px 0}
body.dark{--glass:rgba(0,0,0,.3);--glass-hover:rgba(0,0,0,.45);--border:rgba(255,255,255,.07);background:#0d0d1a}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
#mlyric-wrap{overflow:hidden;height:14px;line-height:14px;min-width:0}
#mlyric{white-space:nowrap;font-size:10px;color:rgba(255,255,255,0.55);transition:color .3s;display:block;padding-right:60px}
#mlyric.playing{color:rgba(255,255,255,0.9)}
@keyframes mLyricMarquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
#mlyric.marquee{animation:mLyricMarquee 10s linear infinite;display:inline-block;padding-left:100%}
#mlyric.paused{animation-play-state:paused}
@media(max-width:768px){.topbar{padding:8px 14px;gap:6px}.logo{font-size:1em}.weather{flex-shrink:0}.music-bar{min-width:160px;padding:6px 10px 6px 6px;gap:7px;max-width:200px}.mcover{width:28px;height:28px;font-size:12px}.mname{font-size:12px}.martist{font-size:9px}.mbtns button{font-size:14px}.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}.wrap{padding:20px 14px 90px}.cat{margin-bottom:24px}.search-box{margin-bottom:24px}.swrap input{padding:11px 44px 11px 18px;font-size:14px}.lan-btn{bottom:14px;right:14px;font-size:11px;padding:9px 14px}.lan-panel{bottom:68px;width:180px}.mpctrl button{font-size:18px;padding:5px}.mpctrl{gap:10px}.mpalbum{width:100px;height:100px}#mpcd{width:64px;height:64px}}
@media(max-width:480px){.topbar{flex-wrap:nowrap;padding:8px 10px}.logo{font-size:.95em;letter-spacing:1px}.weather-desc,#wdesc{display:none}.music-bar{max-width:150px;padding:5px 7px 5px 4px}.mbtns{display:none!important}.mcover{width:22px;height:22px;font-size:10px}.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}.card{padding:16px 8px 12px}.ci{font-size:1.7em}.wrap{padding:16px 10px 80px}.swrap input{padding:10px 40px 10px 16px;font-size:13px}.mpalbum{width:90px;height:90px}#mpcd{width:58px;height:58px}#mpcdc{width:22px;height:22px}.lyrics-box{height:60px;font-size:10px}.lyric-line.active{font-size:12px}}
@media(min-width:1200px){.wrap{max-width:1400px}.grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}}
@media(min-width:1600px){.wrap{max-width:1600px;padding:40px 48px 100px}.grid{grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}.card{padding:24px 14px 18px}.ci{font-size:2.4em}.cn{font-size:14px}.cat{margin-bottom:40px}}
</style>
</head>
<body>
<div class="bg"></div>

<!-- 内网开关按钮 -->
<button class="lan-btn" onclick="toggleLan()">🌐 内网</button>

<!-- 内网面板 -->
<div class="lan-panel" id="lanPanel">
  <h3>🌐 内网服务</h3>
  <a class="lan-item" href="http://192.168.2.225:8000" target="_blank">🖥️ 飞牛OS</a>
  <a class="lan-item" href="http://192.168.2.225:8000/v" target="_blank">🎬 飞牛影视</a>
  <a class="lan-item" href="http://192.168.2.225:3000" target="_blank">🎥 MoviePilot</a>
  <a class="lan-item" href="http://192.168.2.1" target="_blank">📡 路由器</a>
  <a class="lan-item" href="http://192.168.2.252" target="_blank">⚡ Opwert</a>
  <div class="lan-tip"><strong>💡 提示：</strong>内网服务需在同一WiFi下访问</div>
</div>

<div class="topbar">
  <div class="logo">小 路 人<span>·</span>导 航</div>
  <div class="weather">
    <span class="weather-icon" id="wicon">🌤</span>
    <div class="weather-info">
      <span class="weather-temp" id="wtemp">--°</span>
      <span class="weather-city" id="wcity">定位中</span>
      <span class="weather-desc" id="wdesc">--</span>
    </div>
  </div>
  <div class="top-right">
    <div class="music-bar" id="musicBar" onclick="toggleMP()">
      <div class="mcover" id="mcover">🎵</div>
      <div class="minfo">
        <div class="mname" id="mname">点击播放</div>
        <div class="martist" id="martist">小路人</div>
      </div>
      <div class="mbtns" onclick="event.stopPropagation()">
        <button class="mbtn" onclick="prevT()">⏮</button>
        <button class="mbtn" onclick="togPlay()" id="pbtn">▶</button>
        <button class="mbtn" onclick="nextT()">⏭</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="search-box">
    <div class="swrap">
      <input type="text" id="sInput" placeholder="🔍 输入关键词，按回车搜索..." onkeydown="if(event.key==='Enter')goSearch()">
      <span class="si">🔍</span>
    </div>
    <div class="engines">
      <span class="epill active" onclick="setE('baidu',this)">百度</span>
      <span class="epill" onclick="setE('bing',this)">必应</span>
      <span class="epill" onclick="setE('google',this)">Google</span>
      <span class="epill" onclick="setE('ddg',this)">DuckDuckGo</span>
    </div>
  </div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>私有服务</h2><div class="ln"></div></div><div class="grid" id="cl"></div></div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>工具导航</h2><div class="ln"></div></div><div class="grid" id="ct"></div></div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>PT · 资源</h2><div class="ln"></div></div><div class="grid" id="cp"></div></div>
  <div class="cat"><div class="catt"><div class="dot"></div><h2>开发 · 云服务</h2><div class="ln"></div></div><div class="grid" id="cd"></div></div>
  <footer>✦ 小路人导航 · 让效率成为一种习惯 ✦</footer>
</div>

<!-- Music Panel -->
<div id="mp">
  <div class="mph"><span class="mpt">🎵 音乐播放</span><button class="mpcls" onclick="toggleMP()">✕</button></div>
  <!-- 搜索栏 -->
  <div class="mpsearch">
    <input type="text" id="mpSInput" placeholder="搜索歌曲..." onkeydown="if(event.key==='Enter')srchMusic()">
    <button class="mpsearchbtn" onclick="srchMusic()">🔍 搜索</button>
  </div>
  <!-- iTunes 直链播放器 -->
  <div id="playerWrap" style="display:none;margin:8px 0 4px">
    <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid var(--border)">
      <img id="songImg" src="" style="width:48px;height:48px;border-radius:8px;flex-shrink:0;object-fit:cover;background:linear-gradient(135deg,#7c6df0,#f472b6)">
      <div style="flex:1;min-width:0">
        <div id="songTitle" style="font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">--</div>
        <div id="songArtist" style="font-size:10px;color:var(--dim);margin-top:2px">--</div>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="mbtn" onclick="prevT()" style="font-size:18px">⏮</button>
        <button class="mbtn" onclick="togPlay()" id="pbtn2" style="font-size:24px;color:#a78bfa">▶</button>
        <button class="mbtn" onclick="nextT()" style="font-size:18px">⏭</button>
      </div>
    </div>
    <!-- 进度条 -->
    <div id="mpBar" style="width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;margin-top:6px;position:relative">
      <div id="mpFill" style="height:100%;background:linear-gradient(90deg,#7c6df0,#a78bfa);border-radius:2px;width:0%;transition:width .3s;pointer-events:none"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-top:4px">
      <span id="mpCur">0:00</span><span id="mpDur">0:30</span>
    </div>
  </div>
  <div id="searchTip" style="text-align:center;font-size:11px;color:var(--dim);margin:4px 0">🔍 输入歌名/歌手，点搜索</div>
  <!-- 歌曲列表 -->
  <div id="songListWrap" style="border-top:1px solid var(--border);padding-top:6px;margin-top:4px">
    <div style="font-size:10px;color:var(--dim);margin-bottom:4px;letter-spacing:1px">📋 播放列表</div>
    <div id="mpRes" style="max-height:200px;overflow-y:auto"></div>
  </div>
</div>

<!-- 隐藏的 audio 元素 -->
<audio id="audioEl" crossorigin="anonymous" style="display:none" preload="metadata" type="audio/mp4"></audio>

<script>
const LINKS=[
  {name:"MoviePilot",icon:"🎬",url:"http://li0580.top:3000",cat:"local",tag:"影视"},
  {name:"飞牛OS",icon:"🖥️",url:"http://li0580.top:8000",cat:"local",tag:"NAS"},
  {name:"道理鱼",icon:"🔍",url:"http://li0580.top:5173",cat:"local",tag:"搜索"},
  {name:"洛雪音乐",icon:"🎵",url:"http://li0580.top:9527/music/",cat:"local",tag:"音乐"},

let pl=[],pi=0,play2=false,mpOpen=false;
const audio=document.getElementById('audioEl');
audio.crossOrigin="anonymous";

async function srchMusic(){
  const q=document.getElementById('mpSInput').value.trim()||'夜空中最亮的星';
  try{
    const r=await fetch('https://itunes.apple.com/search?term='+encodeURIComponent(q)+'&media=music&entity=song&limit=12');
    const d=await r.json();
    if(d.results&&d.results.length){
      pl=d.results.map(s=>({
        title:s.trackName||'未知',
        author:s.artistName||'',
        album:s.collectionName||'',
        duration:s.trackTimeMillis||30000,
        pic:s.artworkUrl100?.replace('100x100','300x300')||'',
        url:s.previewUrl||'',
      }));
      renderRes();
      if(pl.length) playT(0);
    }else{document.getElementById('mpRes').innerHTML='<div style="text-align:center;padding:16px;color:var(--dim);font-size:12px">未找到相关歌曲</div>';}
  }catch(e){document.getElementById('mpRes').innerHTML='<div style="text-align:center;padding:16px;color:var(--dim);font-size:12px">搜索失败，请重试</div>';}
}

function renderRes(){
  const el=document.getElementById('mpRes');
  el.innerHTML=pl.map((t,i)=>{
    const playing=i===pi&&play2?' playing':'';
    const icon=i===pi&&play2?'⏸':'▶';
    return`<div class="mpitem${playing}" onclick="playT(${i})"><div class="rin">${t.title}</div><div class="ria">${t.author}</div></div><span class="rip">${icon}</span></div>`;
  }).join('');
}

function playT(i){
  if(!pl.length)return;
  pi=i;
  const t=pl[pi];
  // 顶部音乐条
  document.getElementById('mname').textContent=t.title;
  document.getElementById('martist').textContent=t.author;
  document.getElementById('pbtn').textContent='⏸';
  document.getElementById('pbtn2').textContent='⏸';
  document.getElementById('mcover').classList.add('playing');
  // 播放器面板
  document.getElementById('playerWrap').style.display='block';
  document.getElementById('searchTip').style.display='none';
  document.getElementById('songImg').src=t.pic||'';
  document.getElementById('songTitle').textContent=t.title;
  document.getElementById('songArtist').textContent=t.author;
  document.getElementById('mpDur').textContent=t.duration?fmt(t.duration/1000):'0:30';
  // 播放直链（强制audio/mp4类型，解决x-m4p兼容问题）
  audio.crossOrigin = "anonymous";
  audio.src = t.url||'';
  audio.type = 'audio/mp4';
  audio.currentTime = 0;
  document.getElementById('mpFill').style.width='0%';
  document.getElementById('mpCur').textContent='0:00';
  if(t.url){
    // 等待音频可播放后再play
    const doPlay = () => {
      audio.play().then(()=>{play2=true;renderRes();}).catch(()=>{play2=false;});
    };
    if(audio.readyState>=3){doPlay();}
    else{audio.addEventListener('canplay',doPlay,{once:true});}
  }else{
    document.getElementById('songTitle').textContent=t.title+' (无预览)';
    play2=false;
  }
  renderRes();
  // 进度条更新
  audio.ontimeupdate=()=>{
    if(audio.duration){
      const pct=(audio.currentTime/audio.duration*100).toFixed(1);
      document.getElementById('mpFill').style.width=pct+'%';
      document.getElementById('mpCur').textContent=fmt(audio.currentTime);
    }
  };
  audio.onended=()=>{nextT();};
}

function fmt(s){return Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0');}

function togPlay(){
  if(!pl.length){document.getElementById('mpSInput').value='夜空中最亮的星';srchMusic();return;}
  if(play2){
    audio.pause();play2=false;
    document.getElementById('pbtn').textContent='▶';
    document.getElementById('pbtn2').textContent='▶';
    document.getElementById('mcover').classList.remove('playing');
  }else{
    audio.play().then(()=>{play2=true;
    document.getElementById('pbtn').textContent='⏸';
    document.getElementById('pbtn2').textContent='⏸';
    document.getElementById('mcover').classList.add('playing');
    }).catch(()=>{play2=false;});
  }
  renderRes();
}

function nextT(){if(pl.length)playT((pi+1)%pl.length);}
function prevT(){if(pl.length)playT((pi-1+pl.length)%pl.length);}

function toggleMP(){
  mpOpen=!mpOpen;
  document.getElementById('mp').classList.toggle('show',mpOpen);
  if(mpOpen&&!pl.length){
    document.getElementById('mpSInput').value='夜空中最亮的星';
    srchMusic();
  }
}

// 进度条点击跳转
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('mpBar')?.addEventListener('click',e=>{
    const bar=document.getElementById('mpBar');
    const rect=bar.getBoundingClientRect();
    if(audio.duration)audio.currentTime=(e.clientX-rect.left)/rect.width*audio.duration;
  });
});
</script>
